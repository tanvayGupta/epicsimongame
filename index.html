<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Simon</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body>
  <h1 id="level-title">Press A Key to Start</h1>
  <div class="container">
    <div class="row">

      <div type="button" id="green" class="btn green" data-color="green">

      </div>

      <div type="button" id="red" class="btn red" data-color="red">
      </div>
    </div>

    <div class="row">

      <div type="button" id="yellow" class="btn yellow" data-color="yellow">
      </div>
      <div type="button" id="blue" class="btn blue" data-color="blue">
      </div>

    </div>

  </div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/game.js"></script>"

</body>

</html>
